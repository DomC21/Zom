app = "zom-ai-backend-v3"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  ALPHA_VANTAGE_API_KEY = "${ALPHA_VANTAGE_API_KEY}"
  OPENAI_API_KEY = "${OPENAI_API_KEY}"
  POLYGON_API_KEY = "${POLYGON_API_KEY}"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    protocol = "http"

[deploy]
  strategy = "immediate"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1s"
